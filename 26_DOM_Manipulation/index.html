    // CREATE

    // This is traversing the DOM and changing the text of the first li element
    function addLanguage(languageName) {
        const ul = document.querySelector('.language');
        const li = document.createElement('li');
        li.innerText = `${languageName}`;
        ul.appendChild(li);
    }

    addLanguage('Python');
    addLanguage('Java');
    addLanguage('C++');


    // This is a more optimal way to add a language to the list without having to query the DOM multiple times
    function addOptimalLanguage(languageName) {
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(languageName));
        document.querySelector('.language').appendChild(li);
    }

    addOptimalLanguage('Rust');



    // EDIT 
    const secondLang = document.querySelector("li:nth-child(2)");
    // secondLang.innerHTML = "Mojo";
    const newLi = document.createElement('li');
    newLi.textContent = "Mojo";
    secondLang.replaceWith(newLi);

    const fourthLang = document.querySelector("li:nth-child(4)");
    fourthLang.outerHTML = "<li>Go</li>";

    
    // DELETE
    const lastLanguage = document.querySelector("li:last-child");
    lastLanguage.remove();

</script>
</html>
